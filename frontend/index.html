      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(n);

    function checkNexus(abbr, totalSales, totalTxns) {
      const t = NEXUS_THRESHOLDS[abbr];
      if (!t || t.noTax) return { nexus: false, reason: "no_tax" };
      if (t.noStateTax) return { nexus: false, reason: "no_state_tax" };

      const salesMet = t.sales > 0 ? totalSales >= t.sales : true;
      const txnsMet = t.txns !== null ? totalTxns >= t.txns : false;

      let triggered;
      if (t.logic === "AND") {
        triggered = salesMet && (t.txns !== null ? txnsMet : true);
      } else {
        triggered = salesMet || txnsMet;
      }

      return {
        nexus: triggered,
        salesMet,
        txnsMet,
        threshold: t,
        reason: triggered ? "economic_nexus" : "below_threshold",
      };
    }

    function StateInputForm({ salesData, setSalesData, onCalculate }) {
      const [quickMode, setQuickMode] = useState(true);
      const [totalRevenue, setTotalRevenue] = useState("");
      const [topStates, setTopStates] = useState([]);
      const [stateInputs, setStateInputs] = useState({});

      function handleQuickCalc() {
        if (!totalRevenue || topStates.length === 0) return;
        const rev = parseFloat(totalRevenue);
        const split = {};
        const perState = rev / topStates.length;
        topStates.forEach(abbr => {
          split[abbr] = { sales: Math.round(perState), txns: Math.round(perState / 75) };
        });
        setSalesData(split);
        onCalculate(split);
      }

      function handleDetailedCalc() {
        const data = {};
        Object.entries(stateInputs).forEach(([abbr, vals]) => {
          if (vals.sales > 0 || vals.txns > 0) {
            data[abbr] = { sales: parseFloat(vals.sales) || 0, txns: parseInt(vals.txns) || 0 };
          }
        });
        if (Object.keys(data).length === 0) return;
        setSalesData(data);
        onCalculate(data);
      }

        setTopStates(prev => prev.includes(abbr) ? prev.filter(s => s !== abbr) : [...prev, abbr]);

          sales: data.sales,
          txns: data.txns,
          ...checkNexus(abbr, data.sales, data.txns),
        }));
      }, [salesData]);

      const nexusStates = results.filter(r => r.nexus);
      const safeStates = results.filter(r => !r.nexus && r.reason !== "no_tax");
      const noTaxStates = results.filter(r => r.reason === "no_tax" || r.reason === "no_state_tax");

      const urgencyLevel = nexusStates.length === 0 ? "safe" : nexusStates.length <= 3 ? "moderate" : "urgent";

      return (
        <section className="py-16 border-t border-white/5 fade-in">

            {/* Summary Banner */}
            <div className={`rounded-2xl p-6 sm:p-8 mb-8 ${
              urgencyLevel === "safe" ? "bg-green-900/30 border border-green-500/20" :
              urgencyLevel === "moderate" ? "bg-yellow-900/30 border border-yellow-500/20" :
              "bg-red-900/30 border border-red-500/20"
            }`}>
              <div className="flex items-start gap-4">
                <div className={`text-3xl`}>
                  {urgencyLevel === "safe" ? "✅" : urgencyLevel === "moderate" ? "⚠️" : "🚨"}
                </div>
                <div>
                  <h2 className="text-xl sm:text-2xl font-bold text-white mb-2">
                    {nexusStates.length === 0
                      ? "You're in the clear — no nexus triggered"
                      : `You likely have sales tax nexus in ${nexusStates.length} state${nexusStates.length > 1 ? "s" : ""}`
                    }
                  </h2>
                  <p className="text-gray-300 text-sm leading-relaxed">
                    {nexusStates.length === 0
                      ? "Based on the data you entered, you haven't crossed economic nexus thresholds in any of these states. Keep monitoring — thresholds can be met quickly as you grow."
                      : `This means you may be required to register, collect, and remit sales tax in ${nexusStates.length > 1 ? "these states" : "this state"}. Failure to comply can result in penalties, back taxes, and interest.`
                    }
                  </p>
                </div>
              </div>
            </div>

            {/* Nexus States Detail */}
            {nexusStates.length > 0 && (
              <div className="mb-8">
                <h3 className="text-lg font-semibold text-red-400 mb-4 flex items-center gap-2">
                  <span className="w-2 h-2 rounded-full bg-red-500" /> States Where You Have Nexus
                </h3>
                <div className="space-y-3">
                  {nexusStates.map(r => (
                    <div key={r.abbr} className="glass rounded-xl p-4 border-l-4 border-red-500">
                      <div className="flex justify-between items-start">
                        <div>
                          <h4 className="text-white font-semibold">{r.name} ({r.abbr})</h4>
                          <p className="text-sm text-gray-400 mt-1">
                            Your sales: {fmt(r.sales)} &middot; Your orders: {r.txns.toLocaleString()}
                          </p>
                        </div>
                        <span className="px-2.5 py-1 rounded-full bg-red-500/20 text-red-400 text-xs font-medium">Nexus Triggered</span>
                      </div>
                      <div className="mt-3 text-xs text-gray-500">
                        Threshold: {r.threshold.sales > 0 ? fmt(r.threshold.sales) + " in sales" : ""}
                        {r.threshold.txns !== null ? ` ${r.threshold.logic} ${r.threshold.txns} transactions` : ""}
                        {r.salesMet && <span className="text-red-400 ml-1">(sales threshold met)</span>}
                        {r.txnsMet && <span className="text-red-400 ml-1">(transaction threshold met)</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Safe States */}
            {safeStates.length > 0 && (
              <div className="mb-8">
                <h3 className="text-lg font-semibold text-green-400 mb-4 flex items-center gap-2">
                  <span className="w-2 h-2 rounded-full bg-green-500" /> States Below Threshold
                </h3>
                <div className="glass rounded-xl p-4">
                  <div className="flex flex-wrap gap-2">
                    {safeStates.map(r => (
                      <div key={r.abbr} className="px-3 py-2 rounded-lg bg-green-500/10 border border-green-500/20 text-sm">
                        <span className="text-green-400 font-medium">{r.abbr}</span>
                        <span className="text-gray-500 ml-2 text-xs">{fmt(r.sales)}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* What to do next — THE MONEY SECTION */}
            {nexusStates.length > 0 && (
              <div id="solutions" className="mt-12 mb-8 fade-in">
                <h3 className="text-2xl font-bold text-white text-center mb-2">What To Do Next</h3>
                <p className="text-gray-400 text-center mb-8 text-sm max-w-xl mx-auto">
                  You need to register for a sales tax permit in each nexus state, then collect and remit tax on future sales. The fastest way to handle this is with tax automation software.
                </p>

                <div className="grid sm:grid-cols-3 gap-4">
                  {SOFTWARE_OPTIONS.map((sw, i) => (
                    <a
                      key={i}
                      href={sw.url}
                      target="_blank"
                      rel="noopener noreferrer"
                      onClick={() => {
                        // Track referral click (analytics placeholder)
                        if (typeof gtag !== 'undefined') gtag('event', 'referral_click', { provider: sw.name, nexus_count: nexusStates.length });
                      }}
                      className={`glass rounded-xl p-5 block hover:bg-white/[0.06] transition group ${sw.highlight ? "ring-2 ring-blue-500/50 relative" : ""}`}
                    >
                      {sw.highlight && (
                        <span className="absolute -top-2.5 left-4 px-2 py-0.5 rounded-full bg-blue-600 text-white text-[10px] font-semibold uppercase tracking-wide">Recommended</span>
                      )}
                      <div className="flex items-center gap-3 mb-3">
                        <img src={sw.logo} alt={sw.name} className="w-8 h-8 rounded-lg bg-white/10" onError={e => e.target.style.display = 'none'} />
                        <div>
                          <h4 className="text-white font-semibold text-sm">{sw.name}</h4>
                          <p className="text-gray-500 text-xs">{sw.tagline}</p>
                        </div>
                      </div>
                      <p className="text-gray-400 text-xs leading-relaxed mb-3">{sw.desc}</p>
                      <div className="flex justify-between items-center text-xs">
                        <span className="text-gray-500">Best for: {sw.best_for}</span>
                        <span className="text-blue-400 font-medium">{sw.price}</span>
                      </div>
                      <div className="mt-3 pt-3 border-t border-white/5 text-center">
                        <span className="text-blue-400 text-sm font-medium group-hover:text-blue-300 transition">
                          Get Started &rarr;
                        </span>
                      </div>
                    </a>
                  ))}
                </div>

                <div className="glass rounded-xl p-5 mt-6 text-center">
                  <p className="text-gray-400 text-sm mb-1">Not sure which is right for you?</p>
                  <p className="text-gray-500 text-xs">If you want to set it and forget it, Zamp handles everything for you. For DIY automation with AI smarts, Kintsugi is fast to set up. For 5+ states or complex operations, Avalara gives you the most coverage.</p>
                </div>
              </div>
            )}

            {/* Reset */}
            <div className="text-center mt-8">
              <button onClick={onReset} className="px-6 py-2.5 rounded-lg glass text-gray-400 text-sm hover:text-white hover:bg-white/[0.06] transition">
                ← Check Different Numbers
              </button>
            </div>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="border-t border-white/5 py-8">
          <div className="max-w-4xl mx-auto px-4 text-center">
            <p className="text-xs text-gray-600 leading-relaxed max-w-lg mx-auto">
              NexusCheck provides estimates based on publicly available economic nexus thresholds. This is not tax advice. Consult a qualified tax professional before making compliance decisions. Thresholds shown reflect data as of Q1 2025.
            </p>
            <p className="text-xs text-gray-700 mt-4">&copy; {new Date().getFullYear()} NexusCheck. All rights reserved.</p>
          </div>
        </footer>
      );
    }

    // ─── App ───
    function App() {
      const [view, setView] = useState("landing"); // landing | input | results
      const [salesData, setSalesData] = useState({});
      const checkerRef = useRef(null);

      function handleStart() {
        setView("input");
        setTimeout(() => checkerRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
      }

      function handleCalculate(data) {
        setSalesData(data);
        setView("results");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function handleReset() {
        setSalesData({});
        setView("input");
        setTimeout(() => checkerRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
      }

      return (
        <div className="min-h-screen flex flex-col">
          <Header />
          <main className="flex-1">
            {view !== "results" && <Hero onStart={handleStart} />}
            {view !== "results" && <HowItWorks />}
            {view === "input" && (
              <div ref={checkerRef}>
                <StateInputForm salesData={salesData} setSalesData={setSalesData} onCalculate={handleCalculate} />
              </div>
            )}
            {view === "results" && <ResultsPanel salesData={salesData} onReset={handleReset} />}
          </main>
          <Footer />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

  <!-- Analytics placeholder — replace with your Google Analytics / Plausible / Fathom snippet -->

</body>
